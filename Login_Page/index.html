<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">

    <div class="shape shape-top-right"></div>
    <div class="shape shape-bottom-left"></div>

    <div class="card-inner">

      <h1 class="card-title">Welcome back</h1>

      <form action="#" method="post">

        <div class="field-group">
          <label for="username" class="field-label">User name / Email</label>
          <input type="email" id="username" name="username" class="field-input" placeholder="Enter your email">
        </div>

        <div class="field-group">
          <label for="password" class="field-label"> Password</label>
          <input type="password" id="password" name="password" class="field-input" placeholder="Enter your password">
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" name="remember"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">LOGIN NOW</button>

      </form>

      <div class="social-section">
        <p class="social-label">log in via</p>
        <div class="social-icons">
          <a href="#" class="social-icon">
            <img src="IMG/insta.png" alt="">
          </a>
          <a href="#" class="social-icon">
            <img src="IMG/facebook.png" alt="">
          </a>
          <a href="#" class="social-icon">
            <img src="IMG/x.png" alt="">
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
